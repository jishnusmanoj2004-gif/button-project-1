<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>button</title>
</head>
<body>
   <div class="flex justify-center items-center h-screen w[100px]">
     <div class="container p-7 bg-stone-900 border m-10 flex gap-10 flex-wrap w-[650px] justify-center">
        <button class="bg-pink-500 px-6 py-2 rounded-sm font-bold">sign up</button>
        <button class="border-3 border-pink-500 text-pink-500 px-6 py-2 rounded-sm font-bold">link <i class="fa-solid fa-link" style="color: rgb(233, 14, 175);"></i></button>
        <button class="bg-yellow-500 px-6 py-2 rounded-sm font-bold">Login <i class="fa-solid fa-link" style="color: rgb(0, 0, 0);"></i></button>
        <button class="border-3 border-yellow-500 text-yellow-500 px-6 py-2 rounded-sm font-bold">search <i class="fa-solid fa-magnifying-glass" style="color: rgb(163, 165, 29);"></i></button>
        <button class="bg-green-500 px-6 py-2 rounded-sm font-bold"><i class="fa-solid fa-circle" style="color: rgb(3, 61, 4);"></i> link-05</button>
        <button class="border-3 border-green-500 text-green-500 px-6 py-2 rounded-sm font-bold"><i class="fa-solid fa-circle" style="color: rgb(5, 78, 14);"></i> link-06</button>
        <button class="bg-blue-500 px-6 py-2 rounded-sm ">More Article <i class="fa-solid fa-arrow-right" style="color: rgb(0, 0, 0);"></i></button>
        <!-- <button class="bg-pink-500 px-6 py-2 rounded-sm">      -->
        <button class="border star icon text-yellow-500 p-1.5 font-bold value="0"> starred <i class="fa-solid fa-star" style="color: rgb(61, 60, 57);"></i><i class="fa-solid fa-caret-down" style="color: rgb(255, 252, 252);"></i></button>
        <div class="relative cursor-point hover:red-500">
            <i class="fa-solid fa-cart-shopping text-4xl" style="color: rgb(255, 255, 255);"></i> 
        <span class="bg-red-500 px-1 rounded-full text-xs absolute top-0 left-7 text-white">7</span>
        </div>
        <button class="px-8 py-2 bg-white text-black border-3 rounded-full cursor-pointer hover:bg-blue-200"><i class="fa-solid fa-circle" style="color: #202122;"></i> Light</button>

         <button class="border-3 px-6 py-2 bg-black rounded-full cursor-pointer hover:bg-blue-200"><i class="fa-solid fa-circle"></i> Dark</button>
    </div>
   </div>
</body>
</html>
