<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>button</title>
</head>
<body>
   <div class="flex justify-center items-center h-screen">
     <div class="container p-7 bg-stone-900 border m-10 flex gap-10 flex-wrap w[900px] justify-center">
        <button class="bg-pink-500 px-6 py-2 rounded-sm font-bold">sign up</button>
        <button class="border-3 border-pink-500 text-pink-500 px-6 py-2 rounded-sm font-bold">link <i class="fa-solid fa-link" style="color: rgb(233, 14, 175);"></i></button>
        <button class="bg-yellow-500 px-6 py-2 rounded-sm font-bold">Login <i class="fa-solid fa-link" style="color: rgb(0, 0, 0);"></i></button>
        <button class="border-3 border-yellow-500 text-yellow-500 px-6 py-2 rounded-sm font-bold">search <i class="fa-solid fa-magnifying-glass" style="color: rgb(241, 245, 6);"></i></button>
        <button class="bg-green-500 px-6 py-2 rounded-sm font-bold"><i class="fa-solid fa-circle" style="color: rgb(3, 61, 4);"></i> link-05</button>
        <button class="border-3 border-green-500 text-green-500 px-6 py-2 rounded-sm font-bold"><i class="fa-solid fa-circle" style="color: rgb(5, 78, 14);"></i> link-06</button>
        <button class="bg-gradient-to-r from-pink-500 to-blue-800 px-6 py-2 rounded-sm font bold">play now <i class="fa-brands fa-google-play" style="color: rgb(0, 0, 0);"></i></button>
        <button class="bg-blue-500 px-6 py-2 rounded-sm ">More Article <i class="fa-solid fa-arrow-right" style="color: rgb(0, 0, 0);"></i></button>
        <!-- <button class="bg-pink-500 px-6 py-2 rounded-sm">      -->
        <button class="border star icon text-yellow-500 p-1.5 font-bold value="0"> starred <i class="fa-solid fa-star" style="color: rgb(61, 60, 57);"></i><i class="fa-solid fa-caret-down" style="color: rgb(255, 252, 252);"></i></button>
        <i class="fa-solid fa-cart-shopping" style="color: rgb(255, 255, 255);"></i> 
        <button class="border-3 border-white-500 text-white-500 px-6 py-2 rounded-md font-bold"><i class="fa-solid fa-circle" style="color: rgb(0, 0, 0);"></i> light</button>
        <button class="border-2 border-black-500 text-white-500 px-6 py-2 rounded-sm font-bold"><i class="fa-solid fa-circle" style="color: rgb(250, 250, 250);"></i> Dark</button>
        
    </div>
   </div>
</body>
</html>
